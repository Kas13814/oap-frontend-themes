<script id="oap-theme-boot">
(function(){
  const root = document.documentElement;

  // Keys used across OAP (index + other pages)
  const KEY_PREF = "pref-theme";          // light | dark (existing)
  const KEY_THEME = "theme";              // optional legacy/alt
  const KEY_MODE  = "oap_theme_mode";     // light | dark | gradient (if used)
  const KEY_INK   = "oap_gradient_ink";   // white | black (if used)

  function readTheme(){
    const v =
      localStorage.getItem(KEY_MODE) ||
      localStorage.getItem(KEY_PREF) ||
      localStorage.getItem(KEY_THEME) ||
      localStorage.getItem("oap_theme") ||
      localStorage.getItem("OAP_THEME") ||
      "";
    const t = String(v || "").toLowerCase();
    if (t === "gradient") return "gradient";
    if (t === "light") return "light";
    if (t === "dark") return "dark";
    // fallback to OS preference
    return (matchMedia && matchMedia("(prefers-color-scheme: light)").matches) ? "light" : "dark";
  }

  function readInk(){
    const v =
      localStorage.getItem(KEY_INK) ||
      localStorage.getItem("gradientInk") ||
      localStorage.getItem("oap_gradientInk") ||
      "";
    const ink = String(v || "white").toLowerCase();
    return (ink === "black") ? "black" : "white";
  }

  function apply(){
    const t = readTheme();
    if (t === "gradient") {
      root.setAttribute("data-theme","gradient");
      root.setAttribute("data-gradient-ink", readInk());
    } else {
      root.setAttribute("data-theme", t);
      root.removeAttribute("data-gradient-ink");
    }
  }

  // Apply immediately
  try { apply(); } catch(_) {}

  // Keep synced if index changes theme
  window.addEventListener("storage", function(e){
    const k = e.key || "";
    if (
      k === KEY_PREF || k === KEY_THEME || k === KEY_MODE || k === KEY_INK ||
      k === "oap_theme" || k === "OAP_THEME" || k === "gradientInk" || k === "oap_gradientInk"
    ){
      try { apply(); } catch(_) {}
    }
  });
})();
</script>

<script>
/* OAP Theme Boot — follow index.html (light/dark/gradient + ink) */
(function () {
  "use strict";
  const KEY_MODE = "oap_theme_mode";
  const KEY_INK  = "oap_gradient_ink";

  const normMode = (v) => {
    v = (v || "").toLowerCase();
    return (v === "light" || v === "dark" || v === "gradient") ? v : "";
  };
  const normInk = (v) => {
    v = (v || "").toLowerCase();
    return (v === "white" || v === "black") ? v : "";
  };

  function readPreferred() {
    let mode = normMode(localStorage.getItem(KEY_MODE));
    let ink  = normInk(localStorage.getItem(KEY_INK));

    if (!mode) {
      mode = normMode(
        localStorage.getItem("OAP_THEME") ||
        localStorage.getItem("pref-theme") ||
        localStorage.getItem("theme")
      ) || "light";
    }

    if (mode !== "gradient") ink = "";
    if (mode === "gradient" && !ink) ink = normInk(localStorage.getItem(KEY_INK)) || "white";

    return { mode, ink };
  }

  function applyTheme() {
    const p = readPreferred();
    document.documentElement.setAttribute("data-theme", p.mode);
    if (p.mode === "gradient") {
      document.documentElement.setAttribute("data-gradient-ink", p.ink);
    } else {
      document.documentElement.removeAttribute("data-gradient-ink");
    }
  }

  applyTheme();
  ["focus", "pageshow", "visibilitychange"].forEach((ev) => {
    window.addEventListener(ev, applyTheme, { passive: true });
  });
  window.addEventListener("storage", applyTheme);
})();
</script>

function supabaseHeaders(extra){

// ===== Helpers =====
const DATE_FMT = 'DD-MM-YYYY';
const TIME_FMT = 'HH:mm';

function normalizeDigits(s){
  if(s == null) return s;
  const map = {
    '٠':'0','١':'1','٢':'2','٣':'3','٤':'4',
    '٥':'5','٦':'6','٧':'7','٨':'8','٩':'9'
  };
  return String(s).replace(/[٠-٩]/g, ch => map[ch] ?? ch);
}

function toDDMMYYYY(s){
  s = normalizeDigits(s);
  if(!s) return '';
  if(/^\d{2}-\d{2}-\d{4}$/.test(s)) return s;
  if(/^\d{4}-\d{2}-\d{2}$/.test(s)){
    const y = s.slice(0,4), m = s.slice(5,7), d = s.slice(8,10);
    return d + '-' + m + '-' + y;
  }
  return s;
}


function ddmmToISO(s){
  s = normalizeDigits(s);
  if(!s) return '';
  // already ISO
  if(/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  // dd-mm-yyyy -> yyyy-mm-dd
  const mm = String(s).match(/^(\d{2})-(\d{2})-(\d{4})$/);
  if(mm) return `${mm[3]}-${mm[2]}-${mm[1]}`;
  return s;
}

function isoToDDMMYYYY(iso){
  if(!iso) return '';
  const m = String(iso).match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(!m) return '';
  return `${m[3]}-${m[2]}-${m[1]}`;
}

function setFieldValue(formId, name, value){
  const el = document.getElementById(formId + '_' + name);
  if(!el) return;
  el.value = (value ?? '');
}


function to24h(t){
  t = normalizeDigits(t);
  const m = String(t||'').match(/(\d{1,2}):(\d{2})/);
  if(!m) return '';
  let hh = Math.max(0, Math.min(23, parseInt(m[1],10) || 0));
  let mm = Math.max(0, Math.min(59, parseInt(m[2],10) || 0));
  return String(hh).padStart(2,'0') + ':' + String(mm).padStart(2,'0');
}

function getTodayISO(){
  const today = new Date();
  const y = today.getFullYear();
  const m = String(today.getMonth()+1).padStart(2,'0');
  const d = String(today.getDate()).padStart(2,'0');
  return y + '-' + m + '-' + d;
}

function getTodayLabel(){
  const today = new Date();
  return today.toLocaleDateString('en-GB', {
    day:'2-digit',
    month:'long',
    year:'numeric'
  });
}

function attachMasks(root){
  root.querySelectorAll('input[data-mask="time"]').forEach(el => {
    el.addEventListener('input', () => {
      let v = normalizeDigits(el.value).replace(/[^0-9]/g,'').slice(0,4);
      if(v.length >= 3) v = v.slice(0,2) + ':' + v.slice(2);
      el.value = v;
    });
    el.addEventListener('blur', () => {
      if(/^(\d{1,2}):(\d{2})$/.test(el.value)) el.value = to24h(el.value);
    });
  });
  root.querySelectorAll('input[data-mask="date"]').forEach(el => {
    el.addEventListener('input', () => {
      let v = normalizeDigits(el.value).replace(/[^0-9]/g,'').slice(0,8);
      if(v.length >= 5) v = v.slice(0,2) + '-' + v.slice(2,4) + '-' + v.slice(4);
      else if(v.length >= 3) v = v.slice(0,2) + '-' + v.slice(2);
      el.value = v;
    });
  });
}

// ===== Supabase request =====
async function insertEmployeeMaster(record){
  const res = await fetch(SUPABASE_URL + '/rest/v1/employee_master_db', {
    method:'POST',
    headers: supabaseHeaders({ 'Prefer': 'return=representation' }),
    body: JSON.stringify(record)
  });
  if(!res.ok){
    const text = await res.text();
    throw new Error(text || ('HTTP ' + res.status));
  }
  return await res.json();
}


async function fetchEmployeeMasterById(empId){
  const id = String(empId || '').trim();
  if(!id) throw new Error('Employee ID is required');
  const url = `${SUPABASE_URL}/rest/v1/employee_master_db?select=*&Employee%20ID=eq.${encodeURIComponent(id)}&limit=1`;
  const res = await fetch(url, {
    method: 'GET',
    headers: supabaseHeaders()
  });
  const txt = await res.text();
  if(!res.ok) throw new Error(txt || ('Fetch failed: ' + res.status));
  let data = [];
  try { data = JSON.parse(txt || '[]'); } catch(e){ data = []; }
  return (Array.isArray(data) && data.length) ? data[0] : null;
}

async function updateEmployeeMaster(empId, payload){
  const id = String(empId || '').trim();
  if(!id) throw new Error('Employee ID is required');
  const url = `${SUPABASE_URL}/rest/v1/employee_master_db?Employee%20ID=eq.${encodeURIComponent(id)}`;
  const res = await fetch(url, {
    method: 'PATCH',
    headers: supabaseHeaders({ 'Prefer': 'return=representation' }),
    body: JSON.stringify(payload)
  });
  const txt = await res.text();
  if(!res.ok) throw new Error(txt || ('Update failed: ' + res.status));
  return txt;
}

  ];

  activeTabId = 'add';
  loadedEmployeeId = null; // Update mode
  let sharedGrid = null;
  let addPanel = null;
  let updatePanel = null;


  const panelGridByTab = {};
  for(const t of TAB_DEFS){
    const b = document.createElement('button');
    b.type = 'button';
    b.className = 'tab-btn';
    b.id = `tab-${t.id}`;
    b.setAttribute('role','tab');
    b.setAttribute('aria-controls', `panel-${t.id}`);
    b.setAttribute('aria-selected','false');
    b.dataset.tab = t.id;
    b.textContent = t.label;

    const p = document.createElement('section');
    p.className = 'tab-panel';
    p.id = `panel-${t.id}`;
    p.setAttribute('role','tabpanel');
    p.setAttribute('aria-labelledby', `tab-${t.id}`);
    p.dataset.tab = t.id;

    if(t.id === 'update'){
      // Update mode header (search by Employee ID)
      p.insertAdjacentHTML('afterbegin', `
        <div class="card" style="margin:12px 12px 0 12px;">
          <div class="card-body">
            <div class="row" style="gap:10px; align-items:end;">
              <div class="field" style="flex:1; min-width:220px;">
                <label>Employee ID</label>
                <input id="update_search_employee_id" type="text" class="mono" placeholder="Enter Employee ID" inputmode="numeric"/>
              </div>
              <button id="btn_update_search" class="btn btn-primary" type="button">Search</button>
              <button id="btn_update_clear" class="btn" type="button">Clear</button>
            </div>
            <div id="update_search_msg" class="muted" style="margin-top:8px;"></div>
          </div>
        </div>
      `);
    }

    const grid = document.createElement('div');
    grid.className = 'form-grid';
    p.appendChild(grid);

    panelGridByTab[t.id] = grid;
    tabsWrap.appendChild(b);
    panelsWrap.appendChild(p);
  }

  // Cache panels and the shared grid (inputs are rendered once)
  addPanel = panelsWrap.querySelector('.tab-panel[data-tab="add"]');
  updatePanel = panelsWrap.querySelector('.tab-panel[data-tab="update"]');
  sharedGrid = addPanel ? addPanel.querySelector('.form-grid') : null;

  function tabForField(name){
    return 'add';
  }

  function updateTabsIndicator(){
    const activeBtn = tabsWrap.querySelector('.tab-btn[aria-selected="true"]') || tabsWrap.querySelector('.tab-btn');
    if(!activeBtn){
      tabsWrap.style.setProperty('--tab-indicator-o','0');
      return;
    }
    const br = activeBtn.getBoundingClientRect();
    const tr = tabsWrap.getBoundingClientRect();

    const x = (br.left - tr.left) + (tabsWrap.scrollLeft || 0);
    const y = (br.top - tr.top) + (tabsWrap.scrollTop || 0);

    tabsWrap.style.setProperty('--tab-indicator-x', x + 'px');
    tabsWrap.style.setProperty('--tab-indicator-y', y + 'px');
    tabsWrap.style.setProperty('--tab-indicator-w', br.width + 'px');
    tabsWrap.style.setProperty('--tab-indicator-h', br.height + 'px');
    tabsWrap.style.setProperty('--tab-indicator-o','1');
  }

  function setActiveTab(tabId){
    activeTabId = tabId;
    if(activeTabId !== 'update') loadedEmployeeId = null;

    // Move the shared form grid between Add / Update tabs (so inputs stay visible in both)
    if(sharedGrid && addPanel && updatePanel){
      if(activeTabId === 'update'){
        // place grid after the search card
        const card = updatePanel.querySelector('.card');
        if(card && card.nextElementSibling !== sharedGrid){
          card.insertAdjacentElement('afterend', sharedGrid);
        } else if(!card && updatePanel.firstElementChild !== sharedGrid){
          updatePanel.insertAdjacentElement('afterbegin', sharedGrid);
        }
      } else {
        // back to Add tab
        if(addPanel.firstElementChild !== sharedGrid){
          addPanel.insertAdjacentElement('afterbegin', sharedGrid);
        }
      }
    }

    for(const btn of tabsWrap.querySelectorAll('.tab-btn')){
      const on = btn.dataset.tab === tabId;
      btn.setAttribute('aria-selected', on ? 'true' : 'false');
    }
    for(const panel of panelsWrap.querySelectorAll('.tab-panel')){
      panel.classList.toggle('active', panel.dataset.tab === tabId);
    }
    sessionStorage.setItem('employeeMasterActiveTab', tabId);
    updateTabsIndicator();
  }

  window.addEventListener('resize', () => { updateTabsIndicator(); });


  tabsWrap.addEventListener('click', (e)=>{
    const btn = e.target.closest('.tab-btn');
    if(!btn) return;
    setActiveTab(btn.dataset.tab);
  });

  const _savedTab = sessionStorage.getItem('employeeMasterActiveTab');
  const _validTabs = new Set(TAB_DEFS.map(t=>t.id));
  setActiveTab(_validTabs.has(_savedTab) ? _savedTab : 'add');
  requestAnimationFrame(() => updateTabsIndicator());

  // --- Role count selectors (patch): show 1/2 fields based on selection ---
  function insertCountSelector(tabId, storageKey, labelText){
    const panel = document.getElementById(`panel-${tabId}`);
    if(!panel) return null;
    const box = document.createElement('div');
    box.className = 'mode-select';
    const selId = `${tabId}-count`;
    box.innerHTML = `
      <label for="${selId}">${labelText}</label>
      <select id="${selId}">
        <option value="1">1</option>
        <option value="2">2</option>
      </select>
    `;
    panel.insertBefore(box, panel.firstChild);

    const sel = box.querySelector('select');
    const saved = sessionStorage.getItem(storageKey);
    if(saved === '2') sel.value = '2';
    sel.addEventListener('change', () => {
      sessionStorage.setItem(storageKey, sel.value);
      applyRoleVisibility();
    });
    return sel;
  }

  const managersCountSel = insertCountSelector('managers', 'employeeMasterManagersCount', 'Number of Duty Managers');
  const supervisorsCountSel = insertCountSelector('supervisors', 'employeeMasterSupervisorsCount', 'Number of Supervisors');
  const controlsCountSel = insertCountSelector('controls', 'employeeMasterControlsCount', 'Number of Controls');

  function setFieldVisible(fieldName, visible){
    const wrap = dyn.querySelector(`[data-field="${fieldName}"]`);
    if(wrap){
      wrap.style.display = visible ? '' : 'none';
      if(!visible){
        const el = document.getElementById(formDef.id + '_' + fieldName);
        if(el) el.value = '';
      }
    }
  }

  function applyRoleVisibility(){
    const m = (managersCountSel && managersCountSel.value) || sessionStorage.getItem('employeeMasterManagersCount') || '1';
    const s = (supervisorsCountSel && supervisorsCountSel.value) || sessionStorage.getItem('employeeMasterSupervisorsCount') || '1';
    const c = (controlsCountSel && controlsCountSel.value) || sessionStorage.getItem('employeeMasterControlsCount') || '1';

    // Managers: 1 => All Halls, 2 => Domestic + International
    setFieldVisible('DutyManagerAllHallsID', m === '1');
    setFieldVisible('DutyManagerDomesticID', m === '2');
    setFieldVisible('DutyManagerInternationalForeignID', m === '2');

    
    // Comments depend on Duty Managers count
    setFieldVisible('CommentsAllHalls', m === '1');
    setFieldVisible('CommentsDomestic', m === '2');
    setFieldVisible('CommentsInternationalForeign', m === '2');
// Supervisors: 1 => All Halls, 2 => Domestic + International
    setFieldVisible('SupervisorAllHallsID', s === '1');
    setFieldVisible('SupervisorDomesticID', s === '2');
    setFieldVisible('SupervisorInternationalForeignID', s === '2');

    // Controls: 1 => Control 1 only, 2 => Control 1 + Control 2
    setFieldVisible('Control2ID', c === '2');
    setFieldVisible('Control2StartTime', c === '2');
    setFieldVisible('Control2EndTime', c === '2');
    setFieldVisible('ControlsDivider', c === '2');
  }



  formDef.fields.forEach(f => {
    const w = document.createElement('div');
    w.dataset.field = f.name;
    if(f.type === 'textarea') w.className = 'full';
    // Keep IDs on their own row so start/end time fields sit on one line
    if(f.name === 'Control1ID' || f.name === 'Control2ID'){
      w.classList.add('full');
    }
    const id = formDef.id + '_' + f.name;
    const reqAttr = f.required ? 'required' : '';
    let c = '';

    if(f.type === 'select'){
      c = `<select id="${id}" ${reqAttr}>${(f.options||[]).map(v => `<option value="${v}">${v}</option>`).join('')}</select>`;
    } else if(f.type === 'textarea'){
      c = `<textarea id="${id}" ${reqAttr}></textarea>`;
    } else if(f.type === 'time'){
      c = `<input id="${id}" type="text" class="mono" data-mask="time" inputmode="numeric" maxlength="5" placeholder="${TIME_FMT}" ${reqAttr}/>`;
    } else if(f.type === 'date'){
      c = `<input id="${id}" type="text" class="mono" data-mask="date" inputmode="numeric" maxlength="10" placeholder="${DATE_FMT}" ${reqAttr}/>`;
    } else if(f.type === 'number'){
      c = `<input id="${id}" type="number" step="any" ${reqAttr}/>`;
    } else {
      c = `<input id="${id}" type="text" ${reqAttr}/>`;
    }

    w.innerHTML = `<label for="${id}">${f.label || f.name}${f.required ? ' *' : ''}</label>` + c;

    // --- Divider between Control 1 and Control 2 ---
    if(f.name === 'Control2ID'){
      const g = panelGridByTab['controls'] || panelsWrap;
      if(!g.querySelector('[data-field="ControlsDivider"]')){
        const d = document.createElement('div');
        d.className = 'field divider';
        d.dataset.field = 'ControlsDivider';
        d.innerHTML = `<div class="sep"></div>`;
        g.appendChild(d);
      }
    }

    const tabId = tabForField(f.name);
    (panelGridByTab[tabId] || panelGridByTab['add']).appendChild(w);
  });

  attachMasks(dyn);
  applyRoleVisibility();

  document.getElementById('clearBtn').onclick = () => {
    formDef.fields.forEach(f => {
      const el = document.getElementById(formDef.id + '_' + f.name);
      if(!el) return;
      if(f.type === 'select'){
        el.selectedIndex = 0;
      } else {
        el.value = '';
      }
      el.style.borderColor = 'var(--ring)';
    });
  };

  document.getElementById('submitBtn').onclick = async () => {
    const payload = {};
    let ok = true;
    const todayISO = getTodayISO();
    const nowISO = new Date().toISOString();

    formDef.fields.forEach(f => {
      const el = document.getElementById(formDef.id + '_' + f.name);
      if(!el) return;
      let v = (el.value || '').trim();
      v = normalizeDigits(v);

      // Dates: allow dd-mm-yyyy input for date fields
      if(f.type === 'date'){
        v = ddmmToISO(toDDMMYYYY(v));
      }

      if(f.required && !v){
        el.style.borderColor = 'crimson';
        ok = false;
      } else {
        el.style.borderColor = 'var(--ring)';
      }

      const columnName = COLUMN_MAP[f.name];
      if(columnName){
        const numericFields = [
          'EmployeeID'
        ];
        if(numericFields.includes(f.name) && v){
          const n = parseInt(v, 10);
          payload[columnName] = Number.isFinite(n) ? n : null;
        } else {
          payload[columnName] = v || null;
        }
      }
    });

    if(!ok){
      showToast('الرجاء تعبئة الحقول المطلوبة بشكل صحيح', true);
      return;
    }
    try{
      if(activeTabId === 'update'){
        const eid = loadedEmployeeId || payload['Employee ID'];
        if(!eid) throw new Error('Search by Employee ID first (Update tab).');
        await updateEmployeeMaster(eid, payload);
      } else {
        await insertEmployeeMaster(payload);
      }
      showToast('تم الحفظ بنجاح ✓', false);
      document.getElementById('clearBtn').click();
    }catch(err){
      console.error(err);
      showToast('خطأ في الحفظ: ' + (err.message || 'Failed'), true);
    }
  };
}

// ===== Form Definition =====
const FORM_DEF = {
  id: 'employee_master',
  title: 'Employee Master',
  description: 'Employee master record form.',
  fields: [
    {name:'RecordDate',label:'Record Date',type:'date'},
    {name:'EmployeeID',label:'Employee ID',type:'text',required:true},
    {name:'EmployeeName',label:'Employee Name',type:'text'},
    {name:'Gender',label:'Gender',type:'text'},
    {name:'Nationality',label:'Nationality',type:'text'},
    {name:'HiringDate',label:'Hiring Date',type:'date'},
    {name:'JobTitle',label:'Job Title',type:'text'},
    {name:'ActualRole',label:'Actual Role',type:'text'},
    {name:'Grade',label:'Grade',type:'text'},
    {name:'Department',label:'Department',type:'text'},
    {name:'PreviousDepartment',label:'Previous Department',type:'text'},
    {name:'CurrentDepartment',label:'Current Department',type:'text'},
    {name:'EmploymentActionType',label:'Employment Action Type',type:'text'},
    {name:'ActionEffectiveDate',label:'Action Effective Date',type:'date'},
    {name:'ExitReason',label:'Exit Reason',type:'text'},
    {name:'Note',label:'Note',type:'textarea',class:'full'}
  ]
};

// ================= Update tab: search/load by Employee ID =================
boot(FORM_DEF);

// Bind Update/Search handlers AFTER boot renders the Update tab elements.
(function bindUpdateSearch(){
  const searchBtn = document.getElementById('btn_update_search');
  const clearBtn  = document.getElementById('btn_update_clear');
  const searchInp = document.getElementById('update_search_employee_id');
  const msgEl     = document.getElementById('update_search_msg');

  if(!searchBtn || !searchInp){
    // If elements are not present, do nothing.
    return;
  }

  async function doSearch(){
    try{
      const empId = normalizeDigits((searchInp.value || '').trim());
      if(!empId){
        if(msgEl) msgEl.textContent = 'Please enter Employee ID to search.';
        return;
      }
      if(msgEl) msgEl.textContent = 'Searching...';

      const row = await fetchEmployeeMasterById(empId);
      if(!row){
        loadedEmployeeId = null;
        if(msgEl) msgEl.textContent = 'No employee found for this Employee ID.';
        return;
      }

      loadedEmployeeId = String(row['Employee ID'] ?? empId);

      setFieldValue(FORM_DEF.id, 'RecordDate',           isoToDDMMYYYY(row['Record Date']));
      setFieldValue(FORM_DEF.id, 'EmployeeID',           String(row['Employee ID'] ?? ''));
      setFieldValue(FORM_DEF.id, 'EmployeeName',         row['Employee Name'] ?? '');
      setFieldValue(FORM_DEF.id, 'Gender',               row['Gender'] ?? '');
      setFieldValue(FORM_DEF.id, 'Nationality',          row['Nationality'] ?? '');
      setFieldValue(FORM_DEF.id, 'HiringDate',           isoToDDMMYYYY(row['Hiring Date']));
      setFieldValue(FORM_DEF.id, 'JobTitle',             row['Job Title'] ?? '');
      setFieldValue(FORM_DEF.id, 'ActualRole',           row['Actual Role'] ?? '');
      setFieldValue(FORM_DEF.id, 'Grade',                row['Grade'] ?? '');
      setFieldValue(FORM_DEF.id, 'Department',           row['Department'] ?? '');
      setFieldValue(FORM_DEF.id, 'PreviousDepartment',   row['Previous Department'] ?? '');
      setFieldValue(FORM_DEF.id, 'CurrentDepartment',    row['Current Department'] ?? '');
      setFieldValue(FORM_DEF.id, 'EmploymentActionType', row['Employment Action Type'] ?? '');
      setFieldValue(FORM_DEF.id, 'ActionEffectiveDate',  isoToDDMMYYYY(row['Action Effective Date']));
      setFieldValue(FORM_DEF.id, 'ExitReason',           row['Exit Reason'] ?? '');
      setFieldValue(FORM_DEF.id, 'Note',                 row['Note'] ?? '');

      if(msgEl) msgEl.textContent = 'Loaded. Edit the fields then press Submit to update.';
    }catch(err){
      loadedEmployeeId = null;
      if(msgEl) msgEl.textContent = 'Error: ' + (err?.message || err);
    }
  }

  function doClear(){
    loadedEmployeeId = null;
    searchInp.value = '';
    if(msgEl) msgEl.textContent = '';
    FORM_DEF.fields.forEach(f => setFieldValue(FORM_DEF.id, f.name, ''));
  }

  searchBtn.addEventListener('click', (e)=>{ e.preventDefault(); doSearch(); });
  if(clearBtn) clearBtn.addEventListener('click', (e)=>{ e.preventDefault(); doClear(); });
  searchInp.addEventListener('keydown', (e)=>{ if(e.key === 'Enter'){ e.preventDefault(); doSearch(); } });
})();
</script>
