<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <script>
(function(){
  try{
    var root = document.documentElement;
    var sp = new URLSearchParams(window.location.search);
    var t = sp.get('theme');
    if(!t){
      try{ t = localStorage.getItem('oap_theme'); }catch(_){}
    }
    if(t) root.setAttribute('data-theme', t);

    var ink = sp.get('gink') || sp.get('gradientInk');
    if(!ink){
      try{ ink = localStorage.getItem('oap_gradient_ink'); }catch(_){}
    }
    if(ink) root.setAttribute('data-gradient-ink', ink);
  }catch(_){}
})();
</script>
  <meta charset="UTF-8" />
  <title>OAP - Reset password</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/assets/css/themes.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>

    * { box-sizing: border-box; }
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }
    body {
      min-height: 100vh;
      font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #F0EFE8;
      display: grid;
      place-items: center;
      padding: 16px;
      color: #fff;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== Card (same style family as Join/Login) ===== */
    .login-box {
      position: relative;
      width: 400px;
      padding: 62px 40px 40px 40px; /* keeps OAP tag separate; content slightly lower */
      background: rgba(0,0,0,.9);
      box-sizing: border-box;
      box-shadow: 0 15px 25px rgba(0,0,0,.6);
      border-radius: 10px;
    }

    /* OAP badge (top-left) */
    .oap-tag{
      position: absolute;
      top: 14px;
      left: 14px;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
    border: 1px solid rgba(255,255,255,.25);
      background: rgba(255,255,255,.04);
      user-select: none;
      pointer-events: none;
      overflow: hidden;
}
    .oap-tag img{
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover; /* fill the square */
    }

    .title {
      text-align: center;
      margin-bottom: 18px;
    }
    .title-main {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 1px;
      margin: 0 0 6px;
      color: #fff;
    }
    .title-sub {
      font-size: 13px;
      color: #aaa;
      margin: 0;
      line-height: 1.6;
    }

    /* ===== Floating label inputs (RTL-friendly labels) ===== */
    .user-box { position: relative; }
    .user-box input {
      width: 100%;
      padding: 10px 12px;
      font-size: 14px;
      color: #fff;
      margin-bottom: 26px;
      border: none;
      border-bottom: 1px solid #fff;
      outline: none;
      background: transparent;
      direction: ltr;
      text-align: left;
    }

    /* Error underline when required field is empty */
    .user-box input.input-error{
      border-bottom-color: #ff0000 !important;
    }
    .user-box input[type="password"]{
      letter-spacing: 0.12em;
    }
    .user-box label {
      position: absolute;
      top: 0;
      left: 0;
      right: auto;
      padding: 10px 0;
      font-size: 14px;
      color: #fff;
      pointer-events: none;
      transition: .5s;
      text-align: left;
      width: 100%;
    }
    .user-box input:focus ~ label,
    .user-box input:valid ~ label {
      top: -20px;
      left: 0;
      color: #fff;
      font-size: 12px;
    }

    /* Autofill fix */
    .user-box input:-webkit-autofill,
    .user-box input:-webkit-autofill:hover,
    .user-box input:-webkit-autofill:focus,
    .user-box input:-webkit-autofill:active{
      -webkit-text-fill-color: #fff;
      caret-color: #fff;
      transition: background-color 9999s ease-in-out 0s;
      box-shadow: 0 0 0 1000px rgba(0,0,0,.9) inset;
      border-bottom: 1px solid #fff;
    }

    /* ===== Animated primary button ===== */
    .btn-submit {
      position: relative;
      display: inline-block;
      width: 100%;
      padding: 10px 20px;
      font-weight: 700;
      color: #fff;
      font-size: 14px;
      text-decoration: none;
      text-transform: uppercase;
      overflow: hidden;
      transition: .5s;
      letter-spacing: 2px;
      background: transparent;
      border: 0;
      cursor: pointer;
      margin-top: 6px;
    }
    .btn-submit:hover {
      background: #fff;
      color: #272727;
      border-radius: 5px;
    }
    .btn-submit span { position: absolute; display: block; }
    .btn-submit span:nth-child(1) {
      top: 0; left: -100%; width: 100%; height: 2px;
      background: linear-gradient(90deg, transparent, #fff);
      animation: btn-anim1 1.5s linear infinite;
    }
    @keyframes btn-anim1 { 0% { left: -100%; } 50%,100% { left: 100%; } }
    .btn-submit span:nth-child(2) {
      top: -100%; right: 0; width: 2px; height: 100%;
      background: linear-gradient(180deg, transparent, #fff);
      animation: btn-anim2 1.5s linear infinite;
      animation-delay: .375s;
    }
    @keyframes btn-anim2 { 0% { top: -100%; } 50%,100% { top: 100%; } }
    .btn-submit span:nth-child(3) {
      bottom: 0; right: -100%; width: 100%; height: 2px;
      background: linear-gradient(270deg, transparent, #fff);
      animation: btn-anim3 1.5s linear infinite;
      animation-delay: .75s;
    }
    @keyframes btn-anim3 { 0% { right: -100%; } 50%,100% { right: 100%; } }
    .btn-submit span:nth-child(4) {
      bottom: -100%; left: 0; width: 2px; height: 100%;
      background: linear-gradient(360deg, transparent, #fff);
      animation: btn-anim4 1.5s linear infinite;
      animation-delay: 1.125s;
    }
    @keyframes btn-anim4 { 0% { bottom: -100%; } 50%,100% { bottom: 100%; } }

    .hint {
      margin-top: 10px;
      font-size: 12px;
      color: #aaa;
      line-height: 1.7;
    }

    .message {
      margin-top: 14px;
      font-size: 13px;
      border-radius: 10px;
      padding: 10px 12px;
      line-height: 1.6;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .message.ok {
      background: rgba(34, 197, 94, 0.10);
      border: 1px solid rgba(34, 197, 94, 0.60);
      color: #bbf7d0;
    }
    .message.err {
      background: rgba(239, 68, 68, 0.10);
      border: 1px solid rgba(248, 113, 113, 0.80);
      color: #fecaca;
    }

    .footer {
      margin-top: 14px;
      font-size: 11px;
      color: #6b7280;
      text-align: center;
      line-height: 1.6;
    }

    @media (max-width: 480px){
      body{ padding: 14px; }
      .login-box{ width: 100%; }
    }

  

/* === PATCH: card sizing (edit numbers here) === */
.login-box{ min-height: 350px !important; }
/* space between title area and first field */
.title{ margin-bottom: 42px !important; }

</style>
  <script src="/assets/js/theme-manager.js" defer></script>
</head>
<body>

  <div class="login-box">
    <div class="oap-tag"><img src="/favicon-32x32.png" alt="OAP" width="28" height="28"></div>

    <div class="title">
      <div class="title-main">Reset password</div>
      <p class="title-sub">Set a new password</p>
    </div>

    <!-- Password reset: supports Supabase recovery token OR OAP code -->
    <div id="step-password">

      
      <!-- STEP 0: Request code (Forgot Password) -->
      <div id="step-request">
        <div class="user-box">
          <input id="fpEmail" type="text" autocomplete="username" required />
          <label>Email / Employee ID</label>
        </div>
        <button id="btnSendCode" class="btn-submit" type="button">
          <span></span><span></span><span></span><span></span>
          Send code
        </button>
        <div class="hint"></div>
      </div>


      <!-- STEP 1: Code -->
      <div id="step-code" style="display:none;">
<div class="user-box" style="margin-bottom: 6px;">
        <input id="resetCode" type="text" inputmode="text" autocomplete="one-time-code" />
        <label for="resetCode">Reset code</label>
      </div>
        <button id="btnVerifyCode" class="btn-submit" type="button">
          <span></span><span></span><span></span><span></span>
          Continue
        </button>
        <div class="hint"></div>
      </div>


      <!-- STEP 2: New password -->
      <div id="step-newpass" style="display:none;">
<!-- If you opened this page from OAP email (no Supabase token), paste the latest code you received -->
      <div class="user-box">
        <input id="newPassword" type="password" required minlength="8" />
        <label for="newPassword">New password</label>
      </div>

      <div class="user-box" style="margin-top: 4px;">
        <input id="confirmPassword" type="password" required minlength="8" />
        <label for="confirmPassword">Confirm password</label>
      </div>

      <button id="btnSetPassword" class="btn-submit" type="button">
        <span></span><span></span><span></span><span></span>
        Update password
      </button>

      <div class="hint">
      </div>
      </div>
    </div>

    <div id="msg" class="message" style="display:none;"></div>

    <div class="footer">
      OAP • System<br />
      Secure password reset page.
    </div>
  </div>

  <script>
  (() => {
    "use strict";

    
    // ===== FORGOT PASSWORD FLOW (request -> code -> new password) =====
    const stepRequest = document.getElementById("step-request");
    const stepCode = document.getElementById("step-code");
    const stepNewPass = document.getElementById("step-newpass");

    const fpEmailInput = document.getElementById("fpEmail");
    const btnSendCode = document.getElementById("btnSendCode");
    const resetCodeInput = document.getElementById("resetCode");
    const btnVerifyCode = document.getElementById("btnVerifyCode");

    function showStep(which){
      if (stepRequest) stepRequest.style.display = (which === "request") ? "" : "none";
      if (stepCode)    stepCode.style.display    = (which === "code") ? "" : "none";
      if (stepNewPass) stepNewPass.style.display = (which === "newpass") ? "" : "none";
    }

    // Auto append @saudiags.com when user types Employee ID starting with 150
    function normalizeSaudiaEmail(raw){
      const v = (raw || "").trim();
      if (!v) return "";
      if (v.includes("@")) return v;
      const digits = v.replace(/\D/g, "");
      if (digits.startsWith("150")) {
        return digits + "@saudiags.com";
      }
      return v;
    }

    if (fpEmailInput){
      fpEmailInput.addEventListener("input", function(){
        const cur = fpEmailInput.value;
        // If user typed digits and starts with 150, show suggestion by auto-appending when length >= 8
        const digits = cur.replace(/\D/g, "");
        if (!cur.includes("@") && digits.startsWith("150") && digits.length >= 8){
          fpEmailInput.value = digits + "@saudiags.com";
          // move cursor to end
          try { fpEmailInput.setSelectionRange(fpEmailInput.value.length, fpEmailInput.value.length); } catch(e){}
        }
      });
    }

    // Initial: always request first (Forgot)
    showStep("request");

    if (btnSendCode){
      btnSendCode.addEventListener("click", async function(){
        hideMsg();
        const email = normalizeSaudiaEmail(fpEmailInput?.value);
        if (!email || !email.includes("@")) return show("err", "أدخل البريد أو الرقم الوظيفي أولاً.");
        // Hide request, show code
        showStep("code");
        resetCodeInput?.focus();

        // Send code via DB RPC
        try{
          const raw = (fpEmailInput?.value || "").trim();
          const normalized = email;
          await sendResetCode(raw, normalized);
        }catch(e){
          // If sending fails, go back to request so user can retry
          showStep("request");
          return show("err", "تعذر إرسال الكود. تحقق من البريد/الرقم الوظيفي ثم حاول مرة أخرى.");
        }

        show("ok", "تم إرسال الكود ✅ تحقق من البريد.");
      });
    }

    if (btnVerifyCode){
      btnVerifyCode.addEventListener("click", function(){
        hideMsg();
        const v = (resetCodeInput?.value || "").trim();
        if (!v) return show("err", "أدخل Reset code أولاً.");
        // Move to passwords (final verification happens on Update password)
        showStep("newpass");
        try { pass1Input?.focus(); } catch(e){}
      });
    }
const $ = (id) => document.getElementById(id);
    const pass1Input = $("newPassword");
    const pass2Input = $("confirmPassword");
    const btnSet = $("btnSetPassword");
    const msgBox = $("msg");

    function show(type, text) {
      msgBox.style.display = "block";
      msgBox.className = "message " + (type === "ok" ? "ok" : "err");
      msgBox.textContent = text;
    }
    function hideMsg(){ msgBox.style.display = "none"; }

    function getParamFrom(where, name){
      try {
        const s = where || "";
        const p = new URLSearchParams(s.replace(/^[#?]/, ""));
        return p.get(name);
      } catch (_) { return null; }
    }
    const q = (name) => getParamFrom(location.search, name);
    const h = (name) => getParamFrom(location.hash, name);

    async function getPublicConfig(){
      try{
        const r = await fetch("/api/public-config", { method: "GET" });
        if (!r.ok) return null;
        return await r.json();
      }catch(_){
        return null;
      }
    }
    function pick(obj, keys){
      for (const k of keys){
        if (obj && obj[k]) return obj[k];
      }
      return null;
    }



    // ===== Send reset code (Forgot Password) via Supabase RPC =====
    // Tries multiple RPC names/parameter shapes to match your DB without changing server logic.
    async function sendResetCode(rawLoginOrEmail, normalizedEmail){
      const cfg = await getPublicConfig();
      const baseUrl = pick(cfg, ["supabase_url","supabaseUrl","url","SUPABASE_URL"]);
      const anonKey = pick(cfg, ["supabase_anon_key","supabaseAnonKey","anon_key","SUPABASE_ANON_KEY"]);
      if (!baseUrl || !anonKey) throw new Error("missing_public_config");

      const base = baseUrl.replace(/\/$/,"");
      const candidates = [
        { fn: "nxs_request_password_reset", body: { p_email: normalizedEmail } },
      ];

      let last = null;
      for (const c of candidates){
        if (!c.body) continue;
        // Skip empty values
        const vals = Object.values(c.body).filter(v => v && String(v).trim() !== "");
        if (vals.length === 0) continue;

        try{
          const r = await fetch(base + "/rest/v1/rpc/" + encodeURIComponent(c.fn), {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "apikey": anonKey,
              "Authorization": "Bearer " + anonKey
            },
            body: JSON.stringify(c.body)
          });

          if (r.ok) return true;

          // Try next candidate on "function not found" or common argument errors
          last = await r.json().catch(() => ({ status: r.status }));
          if ([400,404].includes(r.status)) continue;

          // Other errors: stop
          throw new Error("rpc_failed");
        }catch(e){
          // Keep last error and try next; only throw at end
          if (!last) last = { message: String(e && e.message || e) };
          continue;
        }
      }

      console.error("sendResetCode failed", last);
      throw new Error("send_code_failed");
    }

    async function setPassword(){
      hideMsg();

      const p1 = String(pass1Input.value || "");
      const p2 = String(pass2Input.value || "");
      if (!p1 || p1.length < 8) return show("err", "يجب أن تكون كلمة المرور ٨ أحرف على الأقل.");
      if (p1 !== p2) return show("err", "كلمتا المرور غير متطابقتين.");

      // Inputs from Supabase reset link:
      // ?type=recovery&token_hash=...
      // or legacy hash tokens: #access_token=...&refresh_token=...&type=recovery
      const type = q("type") || h("type") || "recovery";
      const token_hash = q("token_hash") || h("token_hash");
      const access_token_hash = h("access_token");
      const refresh_token_hash = h("refresh_token");

      const reset_code = q("code") || q("reset_code") || null;
      const resetCodeInput = document.getElementById("resetCode");
      if (resetCodeInput && reset_code) resetCodeInput.value = reset_code;


      btnSet.disabled = true;
      const old = btnSet.textContent;
      btnSet.textContent = "Saving...";

      try{
        const cfg = await getPublicConfig();
        const baseUrl = pick(cfg, ["supabase_url","supabaseUrl","url","SUPABASE_URL"]);
        const anonKey = pick(cfg, ["supabase_anon_key","supabaseAnonKey","anon_key","SUPABASE_ANON_KEY"]);
        if (!baseUrl || !anonKey) {
          btnSet.disabled = false;
          btnSet.textContent = old;
          return show("err", "إعدادات Supabase العامة غير متوفرة. تأكد من /api/public-config.");
        }

        let access_token = access_token_hash || null;

        // If we don't have access_token in hash, verify using token_hash (recommended).
        if (!access_token) {
          if (!token_hash || type !== "recovery") {
            // --- OAP Code-based reset (no Supabase recovery token) ---
            const codeVal = (document.getElementById("resetCode")?.value || "").trim();
            if (!codeVal) {
              btnSet.disabled = false;
              btnSet.textContent = old;
              return show("err", "أدخل رمز التفعيل/الاستعادة (Reset code) الذي وصلك في البريد، ثم أعد المحاولة.");
            }

            const rpcRes = await fetch(baseUrl.replace(/\/$/,"") + "/rest/v1/rpc/oap_set_password_with_code", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                "apikey": anonKey,
                "Authorization": "Bearer " + anonKey
              },
              body: JSON.stringify({ p_code: codeVal, p_password_hash: p1 })
            });

            const rpcJson = await rpcRes.json().catch(() => ({}));
            if (!rpcRes.ok) {
              console.error("oap_set_password_with_code error", rpcRes.status, rpcJson);
              btnSet.disabled = false;
              btnSet.textContent = old;
              showStep("code");
              return show("err", "فشل تعيين كلمة المرور. تأكد من أن الرمز صحيح وأنك تستخدم أحدث رمز، ثم جرّب مرة أخرى.");
            }

            show("ok", "تم تحديث كلمة المرور بنجاح ✅ يمكنك الآن تسجيل الدخول.");
            return;
          }

          const verifyRes = await fetch(baseUrl.replace(/\/$/,"") + "/auth/v1/verify", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "apikey": anonKey
            },
            body: JSON.stringify({ type: "recovery", token_hash })
          });

          const verifyJson = await verifyRes.json().catch(() => ({}));
          if (!verifyRes.ok) {
            console.error("verify error", verifyRes.status, verifyJson);
            throw new Error("verify_failed");
          }

          // Supabase returns a session object (may be nested)
          access_token =
            verifyJson?.access_token ||
            verifyJson?.session?.access_token ||
            verifyJson?.data?.session?.access_token ||
            null;

          if (!access_token) {
            console.error("verify response missing access_token", verifyJson);
            throw new Error("no_access_token");
          }
        }

        // Update password
        const updRes = await fetch(baseUrl.replace(/\/$/,"") + "/auth/v1/user", {
          method: "PUT",
          headers: {
            "Content-Type": "application/json",
            "apikey": anonKey,
            "Authorization": "Bearer " + access_token
          },
          body: JSON.stringify({ password: p1 })
        });

        const updJson = await updRes.json().catch(() => ({}));
        if (!updRes.ok) {
          console.error("updateUser error", updRes.status, updJson);
          throw new Error("update_failed");
        }

        show("ok", "تم تحديث كلمة المرور بنجاح ✅ يمكنك الآن تسجيل الدخول.");
      }catch(e){
        show("err", "تعذر تحديث كلمة المرور. اطلب رابط استعادة جديد وحاول مرة أخرى.");
      }finally{
        btnSet.disabled = false;
        btnSet.textContent = old;
      }
    }

    btnSet.addEventListener("click", setPassword);
  })();
</script>

</body>
</html>
