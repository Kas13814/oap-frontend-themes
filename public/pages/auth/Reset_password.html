<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <script>
(function(){
  try{
    var root = document.documentElement;
    var sp = new URLSearchParams(window.location.search);
    var t = sp.get('theme');
    if(!t){
      try{ t = localStorage.getItem('oap_theme'); }catch(_){}
    }
    if(t) root.setAttribute('data-theme', t);

    var ink = sp.get('gink') || sp.get('gradientInk');
    if(!ink){
      try{ ink = localStorage.getItem('oap_gradient_ink'); }catch(_){}
    }
    if(ink) root.setAttribute('data-gradient-ink', ink);
  }catch(_){}
})();
</script>
  <meta charset="UTF-8" />
  <title>OAP - Reset password</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/assets/css/themes.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>

    * { box-sizing: border-box; }
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }
    body {
      min-height: 100vh;
      font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #F0EFE8;
      display: grid;
      place-items: center;
      padding: 16px;
      color: #fff;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== Card (same style family as Join/Login) ===== */
    .login-box {
      position: relative;
      width: 400px;
      padding: 62px 40px 40px 40px; /* keeps OAP tag separate; content slightly lower */
      background: rgba(0,0,0,.9);
      box-sizing: border-box;
      box-shadow: 0 15px 25px rgba(0,0,0,.6);
      border-radius: 10px;
    }

    /* OAP badge (top-left) */
    .oap-tag{
      position: absolute;
      top: 14px;
      left: 14px;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
    border: 1px solid rgba(255,255,255,.25);
      background: rgba(255,255,255,.04);
      user-select: none;
      pointer-events: none;
      overflow: hidden;
}
    .oap-tag img{
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover; /* fill the square */
    }

    .title {
      text-align: center;
      margin-bottom: 18px;
    }
    .title-main {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 1px;
      margin: 0 0 6px;
      color: #fff;
    }
    .title-sub {
      font-size: 13px;
      color: #aaa;
      margin: 0;
      line-height: 1.6;
    }

    /* ===== Floating label inputs (RTL-friendly labels) ===== */
    .user-box { position: relative; }
    .user-box input {
      width: 100%;
      padding: 10px 12px;
      font-size: 14px;
      color: #fff;
      margin-bottom: 26px;
      border: none;
      border-bottom: 1px solid #fff;
      outline: none;
      background: transparent;
      direction: ltr;
      text-align: left;
    }

    /* Error underline when required field is empty */
    .user-box input.input-error{
      border-bottom-color: #ff0000 !important;
    }
    .user-box input[type="password"]{
      letter-spacing: 0.12em;
    }
    .user-box label {
      position: absolute;
      top: 0;
      left: 0;
      right: auto;
      padding: 10px 0;
      font-size: 14px;
      color: #fff;
      pointer-events: none;
      transition: .5s;
      text-align: left;
      width: 100%;
    }
    .user-box input:focus ~ label,
    .user-box input:valid ~ label {
      top: -20px;
      left: 0;
      color: #fff;
      font-size: 12px;
    }

    /* Autofill fix */
    .user-box input:-webkit-autofill,
    .user-box input:-webkit-autofill:hover,
    .user-box input:-webkit-autofill:focus,
    .user-box input:-webkit-autofill:active{
      -webkit-text-fill-color: #fff;
      caret-color: #fff;
      transition: background-color 9999s ease-in-out 0s;
      box-shadow: 0 0 0 1000px rgba(0,0,0,.9) inset;
      border-bottom: 1px solid #fff;
    }

    /* ===== Animated primary button ===== */
    .btn-submit {
      position: relative;
      display: inline-block;
      width: 100%;
      padding: 10px 20px;
      font-weight: 700;
      color: #fff;
      font-size: 14px;
      text-decoration: none;
      text-transform: uppercase;
      overflow: hidden;
      transition: .5s;
      letter-spacing: 2px;
      background: transparent;
      border: 0;
      cursor: pointer;
      margin-top: 6px;
    }
    .btn-submit:hover {
      background: #fff;
      color: #272727;
      border-radius: 5px;
    }
    .btn-submit span { position: absolute; display: block; }
    .btn-submit span:nth-child(1) {
      top: 0; left: -100%; width: 100%; height: 2px;
      background: linear-gradient(90deg, transparent, #fff);
      animation: btn-anim1 1.5s linear infinite;
    }
    @keyframes btn-anim1 { 0% { left: -100%; } 50%,100% { left: 100%; } }
    .btn-submit span:nth-child(2) {
      top: -100%; right: 0; width: 2px; height: 100%;
      background: linear-gradient(180deg, transparent, #fff);
      animation: btn-anim2 1.5s linear infinite;
      animation-delay: .375s;
    }
    @keyframes btn-anim2 { 0% { top: -100%; } 50%,100% { top: 100%; } }
    .btn-submit span:nth-child(3) {
      bottom: 0; right: -100%; width: 100%; height: 2px;
      background: linear-gradient(270deg, transparent, #fff);
      animation: btn-anim3 1.5s linear infinite;
      animation-delay: .75s;
    }
    @keyframes btn-anim3 { 0% { right: -100%; } 50%,100% { right: 100%; } }
    .btn-submit span:nth-child(4) {
      bottom: -100%; left: 0; width: 2px; height: 100%;
      background: linear-gradient(360deg, transparent, #fff);
      animation: btn-anim4 1.5s linear infinite;
      animation-delay: 1.125s;
    }
    @keyframes btn-anim4 { 0% { bottom: -100%; } 50%,100% { bottom: 100%; } }

    .hint {
      margin-top: 10px;
      font-size: 12px;
      color: #aaa;
      line-height: 1.7;
    }

    .message {
      margin-top: 14px;
      font-size: 13px;
      border-radius: 10px;
      padding: 10px 12px;
      line-height: 1.6;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .message.ok {
      background: rgba(34, 197, 94, 0.10);
      border: 1px solid rgba(34, 197, 94, 0.60);
      color: #bbf7d0;
    }
    .message.err {
      background: rgba(239, 68, 68, 0.10);
      border: 1px solid rgba(248, 113, 113, 0.80);
      color: #fecaca;
    }

    .footer {
      margin-top: 14px;
      font-size: 11px;
      color: #6b7280;
      text-align: center;
      line-height: 1.6;
    }

    @media (max-width: 480px){
      body{ padding: 14px; }
      .login-box{ width: 100%; }
    }

  

/* === PATCH: card sizing (edit numbers here) === */
.login-box{ min-height: 350px !important; }
/* space between title area and first field */
.title{ margin-bottom: 42px !important; }

</style>
  <script src="/assets/js/theme-manager.js" defer></script>
</head>
<body>

  <div class="login-box">
    <div class="oap-tag"><img src="/favicon-32x32.png" alt="OAP" width="28" height="28"></div>

    <div class="title">
      <div class="title-main">Reset password</div>
      <p class="title-sub">Set a new password</p>
    </div>

    <!-- Password reset: supports Supabase recovery token OR OAP code -->
    <div id="step-password">

      
      <!-- STEP 1: Code only -->
      <div id="step-code">
<div class="user-box" style="margin-bottom: 6px;">
        <input id="resetCode" type="text" required minlength="4" inputmode="text" autocomplete="one-time-code" />
        <label for="resetCode">Reset code</label>
      </div>
        <button id="btnVerifyCode" class="btn-submit" type="button">
          <span></span><span></span><span></span><span></span>
          Continue
        </button>
        <button id="btnResendCode" class="btn-submit" type="button" style="margin-top:10px;;display:none;">
          <span></span><span></span><span></span><span></span>
          Resend code
        </button>
        <div class="hint"></div>
      </div>

      <!-- STEP 2: Passwords -->
      <div id="step-newpass" style="display:none;">
<div class="user-box">
        <input id="newPassword" type="password" required minlength="8" />
        <label for="newPassword">New password</label>
      </div>

      <div class="user-box" style="margin-top: 4px;">
        <input id="confirmPassword" type="password" required minlength="8" />
        <label for="confirmPassword">Confirm password</label>
      </div>

      <button id="btnSetPassword" class="btn-submit" type="button">
        <span></span><span></span><span></span><span></span>
        Update password
      </button>

      <div class="hint">
      </div>
      </div>
    </div>

    <div id="msg" class="message" style="display:none;"></div>

    <div class="footer">
      OAP • System<br />
      Secure password reset page.
    </div>
  </div>

  <script>
  (() => {
    "use strict";

    const stepCode = document.getElementById("step-code");
    const stepNewPass = document.getElementById("step-newpass");
    const btnVerifyCode = document.getElementById("btnVerifyCode");
    const btnResend = document.getElementById("btnResendCode");
    const resetCodeInput = document.getElementById("resetCode");

    const pass1Input = document.getElementById("newPassword");
    const pass2Input = document.getElementById("confirmPassword");
    const btnSet = document.getElementById("btnSetPassword");
    const msgBox = document.getElementById("msg");

    // ===== helpers =====
    function show(type, text) {
      msgBox.style.display = "block";
      msgBox.className = "message " + (type === "ok" ? "ok" : "err");
      msgBox.textContent = text;
    }
    function hideMsg(){ msgBox.style.display = "none"; }

    function getParamFrom(where, name){
      try {
        const s = where || "";
        const p = new URLSearchParams(s.replace(/^[#?]/, ""));
        return p.get(name);
      } catch (_) { return null; }
    }
    function q(name){ return getParamFrom(location.search, name); }
    function h(name){ return getParamFrom(location.hash, name); }

    function pick(obj, keys){
      for (const k of keys){
        if (obj && obj[k]) return obj[k];
      }
      return null;
    }

    async function getPublicConfig(){
      try{
        const r = await fetch("/api/public-config", { method: "GET" });
        if (!r.ok) return null;
        return await r.json();
      }catch(_){
        return null;
      }
    }

    function hasSupabaseRecoveryTokens(){
      const type = (q("type") || h("type") || "recovery").toLowerCase();
      const token_hash = q("token_hash") || h("token_hash");
      const access_token_hash = h("access_token");
      const refresh_token_hash = h("refresh_token");
      // Accept Supabase password links for both recovery and invite flows
      return (((type === "recovery" || type === "invite") && !!token_hash) || !!access_token_hash || !!refresh_token_hash);
    }

    function showStep(which){
      if (stepCode) stepCode.style.display = (which === "code") ? "" : "none";
      if (stepNewPass) stepNewPass.style.display = (which === "newpass") ? "" : "none";
    }
    function showVerifyOnly(){
      if (btnVerifyCode) btnVerifyCode.style.display = "inline-block";
      if (btnResend) btnResend.style.display = "none";
    }
    function showResendOnly(){
      if (btnVerifyCode) btnVerifyCode.style.display = "none";
      if (btnResend) btnResend.style.display = "inline-block";
    }

    // ===== state =====
    // Only reveal password fields after code verification succeeds.
    let verifiedCode = null;

    // Initial UI
    if (hasSupabaseRecoveryTokens()) {
      showStep("newpass");
    } else {
      showStep("code");
      showVerifyOnly();
    }

    // Prefill code from URL if present (always sync with URL)
    try {
      const urlCode = (q("code") || "").trim();
      if (urlCode && resetCodeInput) resetCodeInput.value = urlCode;
    } catch (_) {}

    // Reset verified state when user edits code
    if (resetCodeInput){
      resetCodeInput.addEventListener("input", () => {
        verifiedCode = null;
        hideMsg();
        showVerifyOnly();
        if (stepNewPass && stepNewPass.style.display !== "none") showStep("code");
      });
    }

    // ===== RPC: verify reset code =====
    async function verifyResetCode(code){
      const cfg = await getPublicConfig();
      if (!cfg || !cfg.supabaseUrl || !cfg.supabaseAnonKey) return false;

      const email = (q("email") || "").trim();
      if (!email) return false; // link must include email for verification

      const r = await fetch(`${cfg.supabaseUrl}/rest/v1/rpc/oap_verify_reset_code`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "apikey": cfg.supabaseAnonKey,
          "Authorization": `Bearer ${cfg.supabaseAnonKey}`
        },
        body: JSON.stringify({ p_email: email, p_code: code })
      });

      if (!r.ok) return false;

      let data = null;
      try { data = await r.json(); } catch(_) { data = null; }
      if (data == null) return false;

      const obj = Array.isArray(data) ? (data[0] || {}) : data;

      if (typeof obj.ok === "boolean") return obj.ok;
      if (typeof obj.valid === "boolean") return obj.valid;

      if (obj.employee_id != null) return true;
      if (obj.user_id != null) return true;
      if (obj.auth_user_id != null) return true;

      return false;
    }

    // ===== resend code =====
    if (btnResend){
      btnResend.addEventListener("click", async function(){
        hideMsg();
        const cfg = await getPublicConfig();
        const email = (q("email") || "").trim();

        if (!email){
          return show("err", "Missing email in the link. Please open the latest email link, or ask admin to resend.");
        }
        if (!cfg || !cfg.supabaseUrl || !cfg.supabaseAnonKey){
          return show("err", "Public config is missing. Cannot resend the code.");
        }

        btnResend.disabled = true;
        const oldTxt = btnResend.textContent;
        btnResend.textContent = "Sending...";

        try{
          const r = await fetch(`${cfg.supabaseUrl}/rest/v1/rpc/nxs_request_password_reset`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "apikey": cfg.supabaseAnonKey,
              "Authorization": `Bearer ${cfg.supabaseAnonKey}`
            },
            body: JSON.stringify({ p_email: email })
          });

          const j = await r.json().catch(()=> ({}));
          if (!r.ok || j?.ok === false){
            console.error("nxs_request_password_reset error", r.status, j);
            show("err", "Could not resend the code. Please try again or contact admin.");
          } else {
            verifiedCode = null;
            if (resetCodeInput) resetCodeInput.value = "";
            showVerifyOnly();
            showStep("code");
            show("ok", "A new reset code has been sent. Check your email.");
          }
        }catch(e){
          console.error(e);
          show("err", "Could not resend the code. Please try again.");
        }finally{
          btnResend.disabled = false;
          btnResend.textContent = oldTxt;
        }
      });
    }

    // ===== verify button =====
    if (btnVerifyCode){
      btnVerifyCode.addEventListener("click", async function(){
        hideMsg();
        const v = (resetCodeInput?.value || "").trim();
        if (!v) return show("err", "Enter the reset code first.");

        btnVerifyCode.disabled = true;
        btnVerifyCode.style.opacity = "0.75";
        try {
          const ok = await verifyResetCode(v);
          if (!ok) {
            verifiedCode = null;
            showResendOnly();
            const shownCode = (resetCodeInput && resetCodeInput.value ? String(resetCodeInput.value) : "").trim().toUpperCase();
            show("err", `Invalid or expired code. (Code: ${shownCode || "N/A"})

Tip: open the latest email (newer code), or paste the newest code here and verify again.`);
            return;
          }
          verifiedCode = v.toUpperCase();
          showStep("newpass");
          pass1Input?.focus();
        } catch (e) {
          console.error(e);
          verifiedCode = null;
          show("err", "Could not verify the code. Please try again.");
        } finally {
          btnVerifyCode.disabled = false;
          btnVerifyCode.style.opacity = "";
        }
      });
    }

    // ===== set password (Supabase recovery OR OAP code) =====
    async function setPassword(){
      hideMsg();

      const p1 = String(pass1Input?.value || "");
      const p2 = String(pass2Input?.value || "");
      if (!p1 || p1.length < 8) return show("err", "يجب أن تكون كلمة المرور ٨ أحرف على الأقل.");
      if (p1 !== p2) return show("err", "كلمتا المرور غير متطابقتين.");

      const type = q("type") || h("type") || "recovery";
      const token_hash = q("token_hash") || h("token_hash");
      const access_token_hash = h("access_token");

      btnSet.disabled = true;
      const old = btnSet.textContent;
      btnSet.textContent = "Saving...";

      try{
        const cfg = await getPublicConfig();
        const baseUrl = pick(cfg, ["supabase_url","supabaseUrl","url","SUPABASE_URL"]);
        const anonKey = pick(cfg, ["supabase_anon_key","supabaseAnonKey","anon_key","SUPABASE_ANON_KEY"]);
        if (!baseUrl || !anonKey) {
          btnSet.disabled = false;
          btnSet.textContent = old;
          return show("err", "إعدادات Supabase العامة غير متوفرة. تأكد من /api/public-config.");
        }

        // ===== OAP code-based reset (NO Supabase recovery token) =====
        if (!hasSupabaseRecoveryTokens()){
          const codeVal = (resetCodeInput?.value || "").trim().toUpperCase();
          const emailVal = (q("email") || "").trim();

          if (!emailVal){
            btnSet.disabled = false;
            btnSet.textContent = old;
            showStep("code");
            return show("err", "Missing email in the link. Please open the latest email link, or request a new reset email.");
          }

          if (!codeVal){
            btnSet.disabled = false;
            btnSet.textContent = old;
            showStep("code");
            return show("err", "أدخل رمز الاستعادة (Reset code) ثم أعد المحاولة.");
          }

          if (!verifiedCode || verifiedCode !== codeVal){
            btnSet.disabled = false;
            btnSet.textContent = old;
            showStep("code");
            showResendOnly();
            return show("err", "تحقق من الرمز أولاً، ثم أعد المحاولة.");
          }

          const rpcRes = await fetch(baseUrl.replace(/\/$/,"") + "/rest/v1/rpc/oap_set_password_with_code", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "apikey": anonKey,
              "Authorization": "Bearer " + anonKey
            },
            body: JSON.stringify({ p_email: emailVal, p_code: codeVal, p_new_password_hash: p1 })
          });

          const rpcJson = await rpcRes.json().catch(() => ({}));
          if (!rpcRes.ok) {
            console.error("oap_set_password_with_code error", rpcRes.status, rpcJson);
            btnSet.disabled = false;
            btnSet.textContent = old;
            showStep("code");
            showResendOnly();
            return show("err", "فشل تعيين كلمة المرور. تأكد من أن الرمز صحيح وأنك تستخدم أحدث رمز، ثم جرّب مرة أخرى.");
          }

          // ✅ Also update Supabase Auth password (so Login works).
          // This calls a server-side endpoint (Cloudflare Pages Function) that uses the Service Role key.
          // If the endpoint is not deployed yet, we do NOT fail the UI; we warn in console only.
          try {
            const authRes = await fetch("/api/auth-set-password", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ email: emailVal, password: p1 })
            });
            const authJson = await authRes.json().catch(() => ({}));
            if (!authRes.ok || authJson?.ok !== true) {
              console.warn("auth-set-password did not confirm ok", authRes.status, authJson);
            }
          } catch (e) {
            console.warn("auth-set-password request failed", e);
          }

          show("ok", "تم تحديث كلمة المرور بنجاح ✅ يمكنك الآن تسجيل الدخول.");
          return;
        }

        // ===== Supabase recovery token flow =====
        let access_token = access_token_hash || null;

        if (!access_token) {
          // Supabase invite links come with type=invite, password recovery links come with type=recovery
          if (!token_hash || (type !== "recovery" && type !== "invite")) throw new Error("missing_token");

          const verifyRes = await fetch(baseUrl.replace(/\/$/,"") + "/auth/v1/verify", {
            method: "POST",
            headers: { "Content-Type": "application/json", "apikey": anonKey },
            body: JSON.stringify({ type, token_hash })
          });

          const verifyJson = await verifyRes.json().catch(() => ({}));
          if (!verifyRes.ok) {
            console.error("verify error", verifyRes.status, verifyJson);
            throw new Error("verify_failed");
          }

          access_token =
            verifyJson?.access_token ||
            verifyJson?.session?.access_token ||
            verifyJson?.data?.session?.access_token ||
            null;

          if (!access_token) {
            console.error("verify response missing access_token", verifyJson);
            throw new Error("no_access_token");
          }
        }

        const updRes = await fetch(baseUrl.replace(/\/$/,"") + "/auth/v1/user", {
          method: "PUT",
          headers: {
            "Content-Type": "application/json",
            "apikey": anonKey,
            "Authorization": "Bearer " + access_token
          },
          body: JSON.stringify({ password: p1 })
        });

        const updJson = await updRes.json().catch(() => ({}));
        if (!updRes.ok) {
          console.error("updateUser error", updRes.status, updJson);
          throw new Error("update_failed");
        }

        show("ok", "تم تحديث كلمة المرور بنجاح ✅ يمكنك الآن تسجيل الدخول.");
      }catch(e){
        console.error(e);
        show("err", "تعذر تحديث كلمة المرور. اطلب رابط استعادة جديد وحاول مرة أخرى.");
      }finally{
        btnSet.disabled = false;
        btnSet.textContent = old;
      }
    }

    if (btnSet) btnSet.addEventListener("click", setPassword);
  })();
</script>


</body>
</html>
