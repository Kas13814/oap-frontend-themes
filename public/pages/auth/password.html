<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <script>
(function(){
  try{
    var root = document.documentElement;
    var sp = new URLSearchParams(window.location.search);
    var t = sp.get('theme');
    if(!t){
      try{ t = localStorage.getItem('oap_theme'); }catch(_){}
    }
    if(t) root.setAttribute('data-theme', t);

    var ink = sp.get('gink') || sp.get('gradientInk');
    if(!ink){
      try{ ink = localStorage.getItem('oap_gradient_ink'); }catch(_){}
    }
    if(ink) root.setAttribute('data-gradient-ink', ink);
  }catch(_){}
})();
</script>
  <meta charset="UTF-8" />
  <title>OAP - Activate account & set password</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/assets/css/themes.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>

    * { box-sizing: border-box; }
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }
    body {
      min-height: 100vh;
      font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #F0EFE8;
      display: grid;
      place-items: center;
      padding: 16px;
      color: #fff;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== Card (same style family as Join/Login) ===== */
    .login-box {
      position: relative;
      width: 400px;
      padding: 62px 40px 40px 40px; /* keeps OAP tag separate; content slightly lower */
      background: rgba(0,0,0,.9);
      box-sizing: border-box;
      box-shadow: 0 15px 25px rgba(0,0,0,.6);
      border-radius: 10px;
    }

    /* OAP badge (top-left) */
    .oap-tag{
      position: absolute;
      top: 14px;
      left: 14px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.25);
      background: rgba(255,255,255,.04);
      color: rgba(255,255,255,.95);
      font-size: 12px;
      letter-spacing: .14em;
      text-transform: uppercase;
      user-select: none;
      pointer-events: none;
    }

    .title {
      text-align: center;
      margin-bottom: 18px;
    }
    .title-main {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 1px;
      margin: 0 0 6px;
      color: #fff;
    }
    .title-sub {
      font-size: 13px;
      color: #aaa;
      margin: 0;
      line-height: 1.6;
    }

    /* ===== Floating label inputs (RTL-friendly labels) ===== */
    .user-box { position: relative; }
    .user-box input {
      width: 100%;
      padding: 10px 12px;
      font-size: 14px;
      color: #fff;
      margin-bottom: 26px;
      border: none;
      border-bottom: 1px solid #fff;
      outline: none;
      background: transparent;
      direction: ltr;
      text-align: left;
    }

    /* Error underline when required field is empty */
    .user-box input.input-error{
      border-bottom-color: #ff0000 !important;
    }
    .user-box input[type="password"]{
      letter-spacing: 0.12em;
    }
    .user-box label {
      position: absolute;
      top: 0;
      left: 0;
      right: auto;
      padding: 10px 0;
      font-size: 14px;
      color: #fff;
      pointer-events: none;
      transition: .5s;
      text-align: left;
      width: 100%;
    }
    .user-box input:focus ~ label,
    .user-box input:valid ~ label {
      top: -20px;
      left: 0;
      color: #fff;
      font-size: 12px;
    }

    /* Autofill fix */
    .user-box input:-webkit-autofill,
    .user-box input:-webkit-autofill:hover,
    .user-box input:-webkit-autofill:focus,
    .user-box input:-webkit-autofill:active{
      -webkit-text-fill-color: #fff;
      caret-color: #fff;
      transition: background-color 9999s ease-in-out 0s;
      box-shadow: 0 0 0 1000px rgba(0,0,0,.9) inset;
      border-bottom: 1px solid #fff;
    }

    /* ===== Steps ===== */
    .step { display: none; animation: fadeIn 0.18s ease-out; }
    .step.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

    /* ===== Animated primary button ===== */
    .btn-submit {
      position: relative;
      display: inline-block;
      width: 100%;
      padding: 10px 20px;
      font-weight: 700;
      color: #fff;
      font-size: 14px;
      text-decoration: none;
      text-transform: uppercase;
      overflow: hidden;
      transition: .5s;
      letter-spacing: 2px;
      background: transparent;
      border: 0;
      cursor: pointer;
      margin-top: 6px;
    }
    .btn-submit:hover {
      background: #fff;
      color: #272727;
      border-radius: 5px;
    }
    .btn-submit span { position: absolute; display: block; }
    .btn-submit span:nth-child(1) {
      top: 0; left: -100%; width: 100%; height: 2px;
      background: linear-gradient(90deg, transparent, #fff);
      animation: btn-anim1 1.5s linear infinite;
    }
    @keyframes btn-anim1 { 0% { left: -100%; } 50%,100% { left: 100%; } }
    .btn-submit span:nth-child(2) {
      top: -100%; right: 0; width: 2px; height: 100%;
      background: linear-gradient(180deg, transparent, #fff);
      animation: btn-anim2 1.5s linear infinite;
      animation-delay: .375s;
    }
    @keyframes btn-anim2 { 0% { top: -100%; } 50%,100% { top: 100%; } }
    .btn-submit span:nth-child(3) {
      bottom: 0; right: -100%; width: 100%; height: 2px;
      background: linear-gradient(270deg, transparent, #fff);
      animation: btn-anim3 1.5s linear infinite;
      animation-delay: .75s;
    }
    @keyframes btn-anim3 { 0% { right: -100%; } 50%,100% { right: 100%; } }
    .btn-submit span:nth-child(4) {
      bottom: -100%; left: 0; width: 2px; height: 100%;
      background: linear-gradient(360deg, transparent, #fff);
      animation: btn-anim4 1.5s linear infinite;
      animation-delay: 1.125s;
    }
    @keyframes btn-anim4 { 0% { bottom: -100%; } 50%,100% { bottom: 100%; } }

    .hint {
      margin-top: 10px;
      font-size: 12px;
      color: #aaa;
      line-height: 1.7;
    }

    .message {
      margin-top: 14px;
      font-size: 13px;
      border-radius: 10px;
      padding: 10px 12px;
      line-height: 1.6;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .message.ok {
      background: rgba(34, 197, 94, 0.10);
      border: 1px solid rgba(34, 197, 94, 0.60);
      color: #bbf7d0;
    }
    .message.err {
      background: rgba(239, 68, 68, 0.10);
      border: 1px solid rgba(248, 113, 113, 0.80);
      color: #fecaca;
    }

    .footer {
      margin-top: 14px;
      font-size: 11px;
      color: #6b7280;
      text-align: center;
      line-height: 1.6;
    }

    @media (max-width: 480px){
      body{ padding: 14px; }
      .login-box{ width: 100%; }
    }
    /* Code input (keep same layout, just formatting) */
    #employeeId{
      text-transform: uppercase;
      letter-spacing: .22em;
    }


  </style>
  <script src="/assets/js/theme-manager.js" defer></script>
</head>
<body>

  <div class="login-box">
    <div class="oap-tag">OAP</div>

    <div class="title">
      <div class="title-main">Activate account &amp; set password</div>
      <p class="title-sub">Account activation</p>
    </div>

    <!-- الخطوة 1: إدخال الرقم الوظيفي -->
    <div id="step-id" class="step active">
      <div class="user-box">
        <input id="employeeId" type="text" required maxlength="4" inputmode="text" autocapitalize="characters" autocomplete="one-time-code" pattern="[A-Za-z]{2}[0-9]{2}" />
        <label for="employeeId">Code</label>
      </div>

      <button id="btnSendCode" class="btn-submit" type="button">
        <span></span><span></span><span></span><span></span>
        Verify code
      </button>
</div>

    <!-- الخطوة 2: إدخال الكود -->
    <div id="step-code" class="step">
      <div class="user-box">
        <input id="verifyCode" type="text" maxlength="6" required />
        <label for="verifyCode">Verification code</label>
      </div>

      <button id="btnVerifyCode" class="btn-submit" type="button">
        <span></span><span></span><span></span><span></span>
        تحقق من الكود
      </button>

      <div class="hint">
        Check your email for the verification code.<br/>
        If you didn’t receive it, go back and resend the code.
      </div>
    </div>

    <!-- الخطوة 3: Set password -->
    <div id="step-password" class="step">
      <div class="user-box">
        <input id="newPassword" type="password" required minlength="8" />
        <label for="newPassword">New password</label>
      </div>

      <div class="user-box" style="margin-top: 4px;">
        <input id="confirmPassword" type="password" required minlength="8" />
        <label for="confirmPassword">Confirm password</label>
      </div>

      <button id="btnSetPassword" class="btn-submit" type="button">
        <span></span><span></span><span></span><span></span>
        Set password
      </button>

      <div class="hint">
        Set a strong password and confirm it to finish activation.
      </div>
    </div>

    <div id="msg" class="message" style="display:none;"></div>

    <div class="footer">
      OAP • System<br />
      This page works internally.
    </div>
  </div>


  
  
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      // ================================
      // Secure mode:
      // - No Supabase keys in the browser
      // - No direct RPC/REST calls from the browser
      // - Calls your server endpoints only
      // ================================

      // API base:
      // 1) Same-origin (recommended): /api/auth/...
      // 2) Optional override via ?backend=https://... or localStorage.NXS_BACKEND_URL
      const params = new URLSearchParams(window.location.search);
      const backendOverride = (params.get("backend") || "").trim();
      const backendLS = (window.localStorage.getItem("NXS_BACKEND_URL") || "").trim();
      const API_BASE = (backendOverride || backendLS).replace(/\/+$/, ""); // may be empty => same-origin

      const stepId = document.getElementById("step-id");
      const stepCode = document.getElementById("step-code");
      const stepPassword = document.getElementById("step-password");

      const codeInput = document.getElementById("employeeId"); // kept id to preserve design
      const verifyInput = document.getElementById("verifyCode"); // legacy (unused)
      const newPasswordInput = document.getElementById("newPassword");
      const confirmPasswordInput = document.getElementById("confirmPassword");

      const btnVerify = document.getElementById("btnSendCode");     // Verify code
      const btnLegacy = document.getElementById("btnVerifyCode");   // legacy (unused)
      const btnSetPassword = document.getElementById("btnSetPassword");

      const msgBox = document.getElementById("msg");

      // Hide legacy step (kept in HTML to avoid design break)
      if (stepCode) stepCode.style.display = "none";
      if (btnLegacy) {
        btnLegacy.disabled = true;
        btnLegacy.addEventListener("click", () => {
          showMessage("هذه الخطوة غير مستخدمة.", "err");
        });
      }
      if (verifyInput) verifyInput.disabled = true;

      function setInputError(input, isError) {
        if (!input) return;
        if (isError) input.classList.add("input-error");
        else input.classList.remove("input-error");
      }

      [codeInput, newPasswordInput, confirmPasswordInput].forEach((el) => {
        if (!el) return;
        el.addEventListener("input", () => setInputError(el, false));
      });

      (function prefillCodeFromQuery() {
        try {
          const qCode = params.get("code") || params.get("reset_code") || params.get("employeeId") || params.get("employee_id");
          if (qCode && codeInput) codeInput.value = String(qCode).trim().toUpperCase();
        } catch (_) {}
      })();

      let verifiedCode = null;

      function showMessage(text, type) {
        msgBox.textContent = text;
        msgBox.className = "message " + (type === "ok" ? "ok" : "err");
        msgBox.style.display = "block";
      }

      function setStep(step) {
        stepId.classList.remove("active");
        stepPassword.classList.remove("active");
        if (step === "id") stepId.classList.add("active");
        if (step === "password") stepPassword.classList.add("active");
      }

      function apiUrl(path) {
        return (API_BASE ? (API_BASE + path) : path);
      }

      async function postJSON(path, payload) {
        const res = await fetch(apiUrl(path), {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload || {})
        });
        const text = await res.text();
        let data = null;
        try { data = text ? JSON.parse(text) : null; } catch (_) { data = { raw: text }; }

        if (!res.ok) {
          const msg = (data && (data.error || data.detail || data.message)) ? (data.error || data.detail || data.message) : ("http_" + res.status);
          throw new Error(msg);
        }
        return data;
      }

      // Step 1: Verify code (AB12)
      btnVerify.addEventListener("click", async () => {
        msgBox.style.display = "none";

        const code = (codeInput.value || "").trim().toUpperCase();
        const okFormat = /^[A-Z]{2}\d{2}$/.test(code);

        if (!code || !okFormat) {
          setInputError(codeInput, true);
          showMessage("يرجى إدخال الكود الصحيح (حرفين + رقمين) مثل: AB12", "err");
          return;
        }
        setInputError(codeInput, false);

        btnVerify.disabled = true;
        const oldText = btnVerify.textContent;
        btnVerify.textContent = "Verifying...";

        try {
          const data = await postJSON("/api/auth/verify-reset-code", { code });

          if (!data || data.ok === false) {
            showMessage("الكود غير صحيح أو منتهي الصلاحية.", "err");
            return;
          }

          verifiedCode = code;
          setStep("password");
          showMessage("تم التحقق من الكود بنجاح. يمكنك الآن تعيين كلمة المرور.", "ok");
        } catch (err) {
          console.error(err);
          showMessage("تعذر التحقق من الكود.\n" + (err?.message || err), "err");
        } finally {
          btnVerify.disabled = false;
          btnVerify.textContent = oldText;
        }
      });

      // Step 3: Set password (server updates auth.users + clears code)
      btnSetPassword.addEventListener("click", async () => {
        msgBox.style.display = "none";

        const pass1 = (newPasswordInput.value || "");
        const pass2 = (confirmPasswordInput.value || "");

        if (!verifiedCode) {
          showMessage("انتهت الجلسة. يرجى إدخال الكود مرة أخرى.", "err");
          setStep("id");
          return;
        }

        if (!pass1 || pass1.length < 8) {
          setInputError(newPasswordInput, true);
          showMessage("يجب أن تكون كلمة المرور ٨ أحرف على الأقل.", "err");
          return;
        }
        setInputError(newPasswordInput, false);

        if (!pass2) {
          setInputError(confirmPasswordInput, true);
          showMessage("يرجى تأكيد كلمة المرور.", "err");
          return;
        }
        setInputError(confirmPasswordInput, false);

        if (pass1 !== pass2) {
          setInputError(confirmPasswordInput, true);
          showMessage("كلمتا المرور غير متطابقتين.", "err");
          return;
        }
        setInputError(confirmPasswordInput, false);

        btnSetPassword.disabled = true;
        const oldText = btnSetPassword.textContent;
        btnSetPassword.textContent = "جاري الحفظ...";

        try {
          const data = await postJSON("/api/auth/reset-password-by-code", {
            code: verifiedCode,
            new_password: pass1
          });

          if (!data || data.ok === false) {
            showMessage("تعذر تعيين كلمة المرور.", "err");
            return;
          }

          showMessage("تم تعيين كلمة المرور بنجاح ✅ يمكنك الآن تسجيل الدخول.", "ok");
          btnSetPassword.disabled = true;
        } catch (err) {
          console.error(err);
          showMessage("حدث خطأ أثناء حفظ كلمة المرور.\n" + (err?.message || err), "err");
          btnSetPassword.disabled = false;
          btnSetPassword.textContent = oldText;
        }
      });

    });
  </script>


</body>
</html>
