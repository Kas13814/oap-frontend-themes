    <style>
    :root{
      --bg: #ffffff;
      --card: transparent;
      --text: #0f172a;
      --muted: #64748b;
      --border: #cbd5e1;
      --field-bg: #ffffff;
      --field-text: #0f172a;
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --link: #4f46e5;
      --shadow: 0 10px 30px rgba(2,6,23,.08);
    }

    *{ box-sizing: border-box; }

    html, body{
      height: 100%;
      margin: 0;
      font-family: "Inter", system-ui, -apple-system, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    body{
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 16px;
    }

    /* Layout container (no visible card frame, like the screenshots) */
    .login-shell{
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    .brand{
      display:flex;
      align-items:center;
      justify-content:center;
      margin-bottom: 22px;
    }
    .brand img{
      width: 40px;
      height: 40px;
      object-fit: contain;
      filter: drop-shadow(0 8px 20px rgba(0,0,0,.18));
    }

    .login-title{
      margin: 0 0 28px 0;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    form{
      display:flex;
      flex-direction: column;
      gap: 18px;
      text-align: left;
    }

    .row-between{
      display:flex;
      align-items:center;
      justify-content: space-between;
      gap: 12px;
    }

    label{
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }

    .field{
      position: relative;
    }

    input{
      width: 100%;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--field-bg);
      color: var(--field-text);
      padding: 11px 12px;
      font-size: 14px;
      outline: none;
      transition: border-color .15s ease, box-shadow .15s ease, background-color .15s ease;
    }
    input::placeholder{ color: color-mix(in srgb, var(--muted) 85%, transparent); }
    input:focus{
      border-color: color-mix(in srgb, var(--primary) 55%, var(--border));
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--primary) 22%, transparent);
    }

    /* Password eye */
    .pw-toggle{
      position:absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: transparent;
      border: 0;
      color: var(--muted);
      cursor: pointer;
      padding: 6px;
      border-radius: 8px;
      line-height: 1;
    }
    .pw-toggle:hover{
      color: var(--text);
      background: color-mix(in srgb, var(--border) 25%, transparent);
    }

    .forgot{
      font-size: 13px;
      font-weight: 600;
      color: var(--link);
      text-decoration: none;
    }
    .forgot:hover{ text-decoration: underline; }

    .btn-submit{
      width: 100%;
      border: 0;
      border-radius: 8px;
      padding: 11px 14px;
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      background: var(--primary);
      cursor: pointer;
      box-shadow: var(--shadow);
      transition: transform .08s ease, background-color .15s ease, box-shadow .15s ease;
    }
    .btn-submit:hover{ background: var(--primary-hover); }
    .btn-submit:active{ transform: translateY(1px); }
    .btn-submit:disabled{ opacity: .65; cursor:not-allowed; }

    .helper{
      margin-top: 18px;
      text-align: center;
      font-size: 13px;
      color: var(--muted);
    }
    .helper a{
      color: var(--link);
      font-weight: 700;
      text-decoration: none;
    }
    .helper a:hover{ text-decoration: underline; }

    .status-box{
      margin-top: 12px;
      font-size: 13px;
      min-height: 18px;
      color: var(--muted);
      line-height: 1.6;
      white-space: pre-line;
      text-align: left;
    }
    .status-ok{ color: #16a34a; }
    .status-error{ color: #dc2626; }

    /* Autofill */
    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus,
    input:-webkit-autofill:active {
      -webkit-text-fill-color: var(--field-text) !important;
      transition: background-color 9999s ease-out 0s;
      -webkit-box-shadow: 0 0 0px 1000px var(--field-bg) inset !important;
      box-shadow: 0 0 0px 1000px var(--field-bg) inset !important;
      caret-color: var(--field-text) !important;
    }

    /* Theme toggle (tiny, top-right) */
    .theme-toggle{
      position: fixed;
      top: 14px;
      right: 14px;
      width: 40px;
      height: 40px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: color-mix(in srgb, var(--field-bg) 92%, transparent);
      color: var(--text);
      cursor: pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow: 0 10px 24px rgba(0,0,0,.10);
      transition: transform .08s ease, background-color .15s ease;
    }
    .theme-toggle:hover{
      background: color-mix(in srgb, var(--field-bg) 78%, transparent);
    }
    .theme-toggle:active{ transform: translateY(1px); }
  </style>

  <script>
    (function(){
      const root = document.documentElement;
      const btn = document.getElementById('themeToggle');
      const saved = (localStorage.getItem('oap_theme') || '').toLowerCase();
      const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;

      function apply(theme){
        if(theme === 'dark'){
          root.setAttribute('data-theme','dark');
          if(btn) btn.textContent = '☀️';
        }else{
          root.setAttribute('data-theme','light');
          if(btn) btn.textContent = '🌙';
        }
      }

      const initial = (saved === 'dark' || saved === 'light') ? saved : (prefersDark ? 'dark' : 'light');
      apply(initial);

      if(btn){
        btn.addEventListener('click', function(){
          const current = root.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
          const next = current === 'dark' ? 'light' : 'dark';
          localStorage.setItem('oap_theme', next);
          apply(next);
        });
      }
    })();
  </script>

<script>
    // Use the single shared Supabase client (created in /assets/js/nxs_supabase_client.js)
// IMPORTANT: config is loaded async, so we must initialize lazily.
let sb = null;

async function ensureSupabaseConfig() {
  if (window.NXS_SUPABASE_URL && window.NXS_SUPABASE_ANON_KEY) return true;

  try {
    const r = await fetch("/api/public-config", { cache: "no-store" });
    const j = await r.json().catch(() => null);
    if (j && j.ok && j.supabaseUrl && j.supabaseAnonKey) {
      window.NXS_SUPABASE_URL = j.supabaseUrl;
      window.NXS_SUPABASE_ANON_KEY = j.supabaseAnonKey;
      return true;
    }
  } catch (_) {}

  return Boolean(window.NXS_SUPABASE_URL && window.NXS_SUPABASE_ANON_KEY);
}

async function getSupabaseClient() {
  if (sb) return sb;

  const ok = await ensureSupabaseConfig();
  if (!ok) {
    console.error("[NXS] Supabase config missing (before login init)");
    return null;
  }

  // Prefer shared client if it exists
  if (window.NXS_Supabase && window.NXS_Supabase.client) {
    sb = window.NXS_Supabase.client;
    return sb;
  }

  // Fallback: create a local client
  sb = supabase.createClient(window.NXS_SUPABASE_URL, window.NXS_SUPABASE_ANON_KEY);
  return sb;
}

const employeeInput = document.getElementById("Employee_login");
    const passwordInput = document.getElementById("Password");
    const btnLogin = document.getElementById("Login_button");
    const statusBox = document.getElementById("status_box");
    const form = document.getElementById("loginForm");

    function setStatus(message, type) {
      statusBox.textContent = message || "";
      statusBox.classList.remove("status-ok", "status-error");
      if (message) statusBox.classList.add(type === "error" ? "status-error" : "status-ok");
    }

    function cleanDigits(value) {
      return (value || "").replace(/[^\d]/g, "").trim();
    }


    function resolveNext() {
      try {
        const url = new URL(window.location.href);

        // Prefer returnTo (used by oap_access_api.js)
        const returnTo = url.searchParams.get("returnTo");
        if (returnTo && typeof returnTo === "string") {
          if (returnTo.startsWith("/") && !returnTo.toLowerCase().includes("/login")) {
            return returnTo;
          }
        }

        // Backward compatibility: next
        const next = url.searchParams.get("next");
        if (next && typeof next === "string") {
          if (next.startsWith("/") && !next.toLowerCase().includes("/login")) {
            return next;
          }
        }
      } catch (_) {}

      // Default home page after login
      return "/index.html";
    }

    async function callLogin() {
      const rawUser = (employeeInput.value || "").trim();
      const password = (passwordInput.value || "").trim();

      // basic validation
      if (!rawUser || !password) {
        setStatus("Please enter both Email/Employee ID and Password.", "error");
        return;
      }

      // Derive email:
      // - If user typed full email, use it
      // - If user typed digits, use <digits>@saudiags.com
      const digits = cleanDigits(rawUser);
      const loginEmail = rawUser.includes("@")
        ? rawUser.toLowerCase()
        : (digits ? (String(digits) + "@saudiags.com") : "");

      if (!loginEmail) {
        setStatus("Please enter a valid Email or Employee ID.", "error");
        return;
      }

      // simple client-side throttle (best effort)
      const now = Date.now();
      const last = Number(localStorage.getItem("oap_login_last") || "0");
      if (now - last < 1500) {
        setStatus("Please wait a moment and try again.", "error");
        return;
      }
      localStorage.setItem("oap_login_last", String(now));

      btnLogin.disabled = true;
      setStatus("Checking credentials...", "ok");

      try {
        const sbClient = await getSupabaseClient();
        if (!sbClient) {
          setStatus("Supabase is not configured. Please refresh and try again.", "error");
          btnLogin.disabled = false;
          return;
        }

        // ✅ 1) Create Auth session FIRST (this is the real login gate)
        const { data: authData, error: authError } = await sbClient.auth.signInWithPassword({
          email: loginEmail,
          password: password
        });

        if (authError || !authData?.session) {
          console.error("Auth signIn failed:", authError);
          setStatus("Invalid Email/Employee ID or password.", "error");
          return;
        }

        // ✅ 2) (Optional) Fetch role/tenant via RPC (do NOT block login if it fails)
        let rpcData = null;
        try {
          if (digits) {
            const res = await fetch(window.NXS_SUPABASE_URL + "/rest/v1/rpc/oap_login", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                apikey: window.NXS_SUPABASE_ANON_KEY,
                Authorization: "Bearer " + window.NXS_SUPABASE_ANON_KEY
              },
              body: JSON.stringify({
                p_employee_id: Number(digits),
                p_password: password
              })
            });

            const text = await res.text();
            try { rpcData = JSON.parse(text); } catch (_) {}

            if (!res.ok) {
              console.warn("oap_login RPC failed (non-blocking):", res.status, text);
            }
          }
        } catch (e) {
          console.warn("oap_login RPC error (non-blocking):", e);
        }

        // ✅ Fetch employee display name (best effort)
        let employeeName = null;
        try {
          const { data: row, error: viewErr } = await sbClient
            .from('users_with_employee_view')
            .select('"Employee Name",email,employee_id')
            .eq('email', loginEmail)
            .limit(1)
            .maybeSingle();
          if (!viewErr && row) {
            employeeName = row["Employee Name"] || row.EmployeeName || null;
          }
        } catch (e) {}

        // Cache for UI (no secrets)
        try {
          if (employeeName) localStorage.setItem('oap_employee_name', String(employeeName));
        } catch (_) {}

        // Mark login time (used by Access API grace window)
        try { localStorage.setItem("OAP_LOGIN_TS", String(Date.now())); } catch (_) {}

        // Save minimal session hints (no secrets)
        try {
          if (digits) localStorage.setItem("oap_employee_id", String(digits));
          if (rpcData && rpcData.tenant_id != null) localStorage.setItem("oap_tenant_id", String(rpcData.tenant_id));
          if (rpcData && rpcData.role != null) localStorage.setItem("oap_role", String(rpcData.role));
        } catch (_) {}

        // ✅ Create short-lived session info so index.html can verify
        try {
          const now2 = Date.now();
          const ttlMs = 8 * 60 * 60 * 1000; // 8 hours
          sessionStorage.setItem("oap_home_gate_v1", JSON.stringify({
            issued_at: now2,
            expires_at: now2 + ttlMs
          }));
          sessionStorage.setItem("oap_session_v1", JSON.stringify({
            v: 1,
            employee_id: digits ? String(digits) : null,
            employee_name: employeeName ? String(employeeName) : null,
            tenant_id: (rpcData && rpcData.tenant_id != null) ? String(rpcData.tenant_id) : null,
            role: (rpcData && rpcData.role != null) ? String(rpcData.role) : null,
            issued_at: now2,
            expires_at: now2 + ttlMs
          }));
          sessionStorage.setItem("isLoggedIn", "true");
          localStorage.setItem("isLoggedIn", "true");
        } catch (_) {}

                // ✅ Set cookie for Cloudflare Pages Functions gate (worker can read cookies, not localStorage)
        try {
          const at = authData.session.access_token;
          const rt = authData.session.refresh_token;
          const maxAge = 8 * 60 * 60; // 8h
          document.cookie = `oap_at=${encodeURIComponent(at)}; Max-Age=${maxAge}; Path=/; SameSite=Lax; Secure`;
          // refresh token is optional; keep short and scoped
          document.cookie = `oap_rt=${encodeURIComponent(rt)}; Max-Age=${maxAge}; Path=/; SameSite=Lax; Secure`;
        } catch (_) {}

setStatus("Login successful. Redirecting...", "ok");

        // ✅ Redirect after login
        const homeUrl = resolveNext();

        // Try multiple navigation methods for maximum compatibility
        setTimeout(() => {
          try { window.location.replace(homeUrl); return; } catch (_) {}
          try { window.location.assign(homeUrl); return; } catch (_) {}
          try { window.location.href = homeUrl; return; } catch (_) {}
          try { window.open(homeUrl, "_self"); return; } catch (_) {}
        }, 50);

      } catch (err) {
        console.error(err);
        setStatus("Login failed. Please check your connection and try again.", "error");
      } finally {
        btnLogin.disabled = false;
      }
    }

    // Password show/hide (added)
    const togglePassword = document.getElementById("togglePassword");
    if (togglePassword) {
      togglePassword.setAttribute("data-state", "hidden");
      togglePassword.onclick = () => {
        const isPw = passwordInput.type === "password";
        passwordInput.type = isPw ? "text" : "password";
        togglePassword.setAttribute("data-state", isPw ? "shown" : "hidden");
      };
}

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      callLogin();
    });

    // ✅ Hard navigation for Reset/Join links (prevents any script/router from hijacking clicks)
    // Runs in CAPTURE phase so it executes before other click handlers.
    document.addEventListener("click", (e) => {
      const a = e.target && e.target.closest ? e.target.closest("a#linkResetPassword, a#linkJoinWorkspace") : null;
      if (!a) return;
      // Only for left-click / touch
      if (e.button != null && e.button !== 0) return;
      e.preventDefault();
      e.stopPropagation();
      if (typeof e.stopImmediatePropagation === "function") e.stopImmediatePropagation();
      // Force full-page navigation
      // Always force the intended destination (prevents SPA/service-worker fallbacks)
      const dest = (a.id === "linkResetPassword")
        ? "/pages/auth/Forgot%20password.html"
        : "/pages/auth/joining.html";
      window.location.assign(dest);
    }, true);

    // If already authenticated, jump directly to requested destination (or default)
// Auto-redirect on page load disabled to avoid redirect loops between Login and AI.
// We now only redirect *after* a successful login via callLogin().

</script>


<script>

  // Auto-complete @saudiags.com when the user enters 8 digits starting with 150 (e.g., 15011111)
  (function autoEmailFromId() {
    const DOMAIN = "@saudiags.com";
    const form = document.querySelector("form") || document;
    // Prefer a likely username/email input; fall back to first text/email input
    const input =
      form.querySelector('#username, #email, #user, input[name="username"], input[name="email"], input[name="user"], input[type="email"], input[type="text"]');

    if (!input) return;

    // Make it behave like an email field (keyboard on mobile + basic validation)
    if (!input.getAttribute("type") || input.getAttribute("type").toLowerCase() === "text") {
      input.setAttribute("type", "email");
    }
    input.setAttribute("inputmode", "email");
    input.setAttribute("autocomplete", "username");

    let lastApplied = "";

    input.addEventListener("input", () => {
      const v = String(input.value || "").trim();

      // If user already typed an email, do nothing
      if (v.includes("@")) {
        lastApplied = "";
        return;
      }

      // Only when exactly 8 digits and starts with 150
      if (/^150\d{5}$/.test(v)) {
        const completed = v + DOMAIN;
        // Prevent re-applying if user is editing
        if (completed !== lastApplied) {
          input.value = completed;
          lastApplied = completed;
          // Put cursor at end
          try { input.setSelectionRange(input.value.length, input.value.length); } catch (e) {}
          // Trigger any listeners that depend on value changes
          input.dispatchEvent(new Event("change", { bubbles: true }));
          // Move focus to password after auto-completing
          const pw = document.getElementById("Password");
          if (pw) { pw.focus(); }
        }
      } else {
        lastApplied = "";
      }
    });
  })();

</script>
<script>
  (function(){
    const KEY = "oap_login_theme";
    const root = document.documentElement;

    function apply(theme){
      if(theme){ root.setAttribute("data-theme", theme); }
      else{ root.removeAttribute("data-theme"); }
    }

    // Auto from system unless user saved
    const saved = localStorage.getItem(KEY);
    if(saved === "dark" || saved === "light") apply(saved);

    // Create a tiny toggle button (top-right)
    const btn = document.createElement("button");
    btn.id = "oapThemeToggle";
    btn.type = "button";
    btn.setAttribute("aria-label","Toggle theme");
    btn.textContent = (root.getAttribute("data-theme") === "dark") ? "☀️" : "🌙";
    btn.style.cssText = [
          "position:fixed","top:18px","right:18px","z-index:9999",
          "width:44px","height:44px","border-radius:12px",
          "border:none","background:transparent",
          "color:var(--text)","cursor:pointer"
        ].join(";");

    btn.addEventListener("click", function(){
      const current = root.getAttribute("data-theme");
      const next = (current === "dark") ? "light" : "dark";
      apply(next);
      localStorage.setItem(KEY, next);
      btn.textContent = (next === "dark") ? "☀️" : "🌙";
    });

    document.addEventListener("DOMContentLoaded", function(){
      document.body.appendChild(btn);
    });
  })();
</script>
